services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: mssql_2025
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Password123
      - MSSQL_PID=Developer
    volumes:
      - mssql_data:/var/opt/mssql

  redis:
    image: redis:7.4-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"

volumes:
  mssql_data:
